<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AMUG Side Quest NPC</title>

<style>

:root{
  --bg:#ffffff;
  --text:#000000;
  --accent:#000000;
  --border:#000000;
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:"Courier New", Courier, monospace;
  text-rendering:optimizeLegibility;
}

.page{
  max-width:900px;
  margin:auto;
  padding:6px;
  text-align:center;
}

.title{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:6px;
  font-size:clamp(20px,4.5vw,32px);
  font-weight:900;
  margin-bottom:6px;
  letter-spacing:1px;
}

.generate-wrap{
  margin-bottom:6px;
}

.generate-btn{
  background:white;
  border:3px solid black;
  padding:10px 20px;
  font-size:18px;
  font-weight:900;
  font-family:"Courier New", Courier, monospace;
  cursor:pointer;
}

.generate-btn:hover{
  background:#f3f3f3;
}

.quest-card{

  border:3px dashed black;
  padding:10px 10px;
  margin-bottom:8px;

}

.quest-rarity{
  font-size:20px;
  font-weight:900;
  margin-bottom:4px;
}

.quest-id{
  border:2px solid black;
  display:inline-block;
  padding:2px 6px;
  font-size:12px;
  font-weight:900;
  margin-bottom:6px;
}

.quest-text{
  font-size:20px;
  font-weight:900;
  line-height:1.15;
}

.footer{
  margin-top:6px;
  font-size:13px;
  font-weight:900;
}

@media print{

.generate-wrap{
display:none;
}

body{
background:white;
color:black;
}

}

</style>

</head>

<body>

<div class="page">

<div class="title">
🎮 AMUG SIDE QUEST NPC 🎮
</div>

<div class="generate-wrap">
<button id="generateBtn" class="generate-btn">Generate Quests</button>
</div>

<div id="questContainer"></div>

<div class="footer">
Bring your photo evidence to the <b>SAVE POINT NPC</b>
</div>

</div>

<script>

const common = [
{id:"C-001",text:"Take a picture with someone attending AMUG for the first time"},
{id:"C-002",text:"Take a picture with someone who owns a personal 3D printer"},
{id:"C-003",text:"Take a picture with someone who has printed a functional part"},
{id:"C-004",text:"Take a picture with someone who has had a print fail overnight"},
{id:"C-005",text:"Take a picture with someone who has modified a 3D printer"},
{id:"C-006",text:"Take a picture with someone who has used a resin printer"},
{id:"C-007",text:"Take a picture with someone who has used PETG filament"},
{id:"C-008",text:"Take a picture with someone who has designed a part in CAD"},
{id:"C-009",text:"Take a picture with someone who has printed a replacement part"},
{id:"C-010",text:"Take a picture with someone who has leveled a print bed"},
{id:"C-011",text:"Take a picture with someone wearing AMUG flair from a previous year"},
{id:"C-012",text:"Take a picture with someone who traveled to AMUG from another state"},
{id:"C-013",text:"Take a picture with someone who works in engineering"},
{id:"C-014",text:"Take a picture with someone who works in manufacturing"},
{id:"C-015",text:"Take a picture with someone who works in product development"}
]

const rare=[
{id:"R-001",text:"Take a picture with someone running a print farm"},
{id:"R-002",text:"Take a picture with someone printing carbon fiber materials"},
{id:"R-003",text:"Take a picture with someone who uses HP Multi Jet Fusion"},
{id:"R-004",text:"Take a picture with someone printing production parts"},
{id:"R-005",text:"Take a picture with someone working in aerospace manufacturing"},
{id:"R-006",text:"Take a picture with someone who has designed lattice structures"},
{id:"R-007",text:"Take a picture with someone who has used topology optimization"},
{id:"R-008",text:"Take a picture with someone printing nylon parts"},
{id:"R-009",text:"Take a picture with someone who has built their own printer"},
{id:"R-010",text:"Take a picture with someone who has printed flexible materials"}
]

const legendary=[
{id:"L-001",text:"Take a picture with someone who prints titanium parts"},
{id:"L-002",text:"Take a picture with someone running over fifty printers"},
{id:"L-003",text:"Take a picture with someone who helped pioneer additive at their company"},
{id:"L-004",text:"Take a picture with someone who has patented additive technology"},
{id:"L-005",text:"Take a picture with someone who helped bring a printer to market"},
{id:"L-006",text:"Take a picture with someone who works on additive standards"},
{id:"L-007",text:"Take a picture with someone who runs additive production 24/7"},
{id:"L-008",text:"Take a picture with someone who printed aerospace flight hardware"},
{id:"L-009",text:"Take a picture with someone who built a digital additive factory"},
{id:"L-010",text:"Take a picture with someone who helped scale additive globally"}
]

function randomQuest(list){
return list[Math.floor(Math.random()*list.length)]
}

function renderCard(label,quest){

return `
<div class="quest-card">
<div class="quest-rarity">${label}</div>
<div class="quest-id">${quest.id}</div>
<div class="quest-text">${quest.text}</div>
</div>
`

}

function generateQuests(){

const c=randomQuest(common)
const r=randomQuest(rare)
const l=randomQuest(legendary)

document.getElementById("questContainer").innerHTML=

renderCard("COMMON QUEST",c)+
renderCard("RARE QUEST",r)+
renderCard("LEGENDARY QUEST",l)

}

document.getElementById("generateBtn").addEventListener("click",generateQuests)

generateQuests()

</script>

</body>
</html>
